apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: phoenix-mcp-adapter
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "false"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: phoenix-mcp-adapter-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: us-east4-docker.pkg.dev/PROJECT_ID/evidence-freezer/phoenix-mcp-adapter:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: PHOENIX_HOST
              value: https://evidence-freezer-phoenix-HASH-ue.a.run.app
            - name: PHOENIX_PROJECT_NAME
              value: default
            - name: PHOENIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: phoenix-system-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /healthz
          livenessProbe:
            httpGet:
              path: /healthz
